<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Advanced Calendar UI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet"/>
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#3B82F6", // Blue accent
                        "background-light": "#F3F4F6",
                        "background-dark": "#111827",
                        "glass-light": "rgba(255, 255, 255, 0.7)",
                        "glass-dark": "rgba(31, 41, 55, 0.7)",
                        "border-light": "rgba(255, 255, 255, 0.4)",
                        "border-dark": "rgba(255, 255, 255, 0.1)",
                    },
                    fontFamily: {
                        display: ["Inter", "sans-serif"],
                    },
                    borderRadius: {
                        DEFAULT: "0.75rem",
                    },
                    boxShadow: {
                        'glass': '0 8px 32px 0 rgba(31, 38, 135, 0.07)',
                        'inner-light': 'inset 0 2px 4px 0 rgba(255, 255, 255, 0.3)',
                    }
                },
            },
        };
    </script>
<style>
        .glass-panel {
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }input[type=range] {
            -webkit-appearance: none; 
            background: transparent; 
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
        }
        input[type=range]:focus {
            outline: none; 
        }.no-scrollbar::-webkit-scrollbar {
            display: none;
        }.no-scrollbar {
            -ms-overflow-style: none;scrollbar-width: none;}
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark text-gray-800 dark:text-gray-100 font-display min-h-screen transition-colors duration-300 relative overflow-hidden flex items-center justify-center p-4">
<div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-blue-200 dark:bg-blue-900 rounded-full blur-[120px] opacity-40 animate-pulse"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[50%] h-[50%] bg-indigo-200 dark:bg-indigo-900 rounded-full blur-[120px] opacity-40 animate-pulse" style="animation-delay: 2s;"></div>
<div class="absolute top-[20%] right-[20%] w-[30%] h-[30%] bg-white dark:bg-gray-800 rounded-full blur-[80px] opacity-30"></div>
<div class="relative w-full max-w-4xl flex flex-col items-center gap-8">
<div class="text-center space-y-2 mb-4">
<h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-gray-900 dark:text-white">Time Dimension Widget</h1>
<p class="text-gray-500 dark:text-gray-400 max-w-lg mx-auto">Powered by a simple Javascript array structure. Select ranges across different time granularities.</p>
</div>
<div class="relative w-full max-w-2xl">
<div class="absolute -top-12 left-0 flex gap-3">
<button class="glass-panel bg-white/60 dark:bg-gray-800/60 hover:bg-white/80 dark:hover:bg-gray-700/60 border border-white/50 dark:border-gray-600/30 shadow-sm rounded-lg p-2 transition-all group">
<span class="material-icons text-gray-600 dark:text-gray-300 text-sm group-hover:scale-110 transition-transform">north_west</span>
</button>
<button class="glass-panel bg-white/60 dark:bg-gray-800/60 hover:bg-white/80 dark:hover:bg-gray-700/60 border border-white/50 dark:border-gray-600/30 shadow-sm rounded-lg p-2 transition-all group">
<span class="material-icons text-gray-600 dark:text-gray-300 text-sm group-hover:rotate-180 transition-transform duration-500">refresh</span>
</button>
</div>
<div class="glass-panel bg-glass-light dark:bg-glass-dark border border-white/60 dark:border-gray-600/30 shadow-glass rounded-2xl overflow-hidden backdrop-blur-xl">
<div class="border-b border-gray-200/50 dark:border-gray-700/50 p-1">
<div class="flex items-center justify-between px-6 py-4 hover:bg-white/30 dark:hover:bg-gray-700/30 rounded-lg transition-colors cursor-pointer group">
<span class="text-xs font-bold tracking-widest text-gray-500 dark:text-gray-400 uppercase">Year</span>
<div class="flex-1 px-8 overflow-x-auto no-scrollbar flex items-center justify-center gap-4">
<div class="px-4 py-2 rounded-lg border border-gray-300/50 dark:border-gray-600/50 bg-white/40 dark:bg-gray-800/40 text-gray-600 dark:text-gray-300 font-medium hover:bg-white/60 dark:hover:bg-gray-700/60 transition-all cursor-pointer whitespace-nowrap shadow-sm">
                                [ 2024 ]
                            </div>
<div class="px-5 py-2 rounded-lg bg-primary text-white font-semibold shadow-md shadow-blue-500/30 transform scale-105 whitespace-nowrap cursor-pointer ring-2 ring-primary ring-offset-2 ring-offset-transparent">
                                [ 2025 ]
                            </div>
<div class="px-4 py-2 rounded-lg border border-gray-300/50 dark:border-gray-600/50 bg-white/40 dark:bg-gray-800/40 text-gray-600 dark:text-gray-300 font-medium hover:bg-white/60 dark:hover:bg-gray-700/60 transition-all cursor-pointer whitespace-nowrap shadow-sm">
                                [ 2026 ]
                            </div>
</div>
<span class="material-icons text-gray-400 dark:text-gray-500 group-hover:text-gray-600 dark:group-hover:text-gray-300 transition-colors">expand_less</span>
</div>
</div>
<div class="border-b border-gray-200/50 dark:border-gray-700/50 p-1">
<div class="flex items-center justify-between px-6 py-4 hover:bg-white/30 dark:hover:bg-gray-700/30 rounded-lg transition-colors cursor-pointer group">
<span class="text-xs font-bold tracking-widest text-gray-500 dark:text-gray-400 uppercase">Quarter</span>
<div class="flex-1"></div>
<span class="material-icons text-gray-400 dark:text-gray-500 group-hover:text-gray-600 dark:group-hover:text-gray-300 transition-colors">expand_more</span>
</div>
</div>
<div class="border-b border-gray-200/50 dark:border-gray-700/50 p-1">
<div class="flex items-center justify-between px-6 py-4 hover:bg-white/30 dark:hover:bg-gray-700/30 rounded-lg transition-colors cursor-pointer group">
<span class="text-xs font-bold tracking-widest text-gray-500 dark:text-gray-400 uppercase">Month</span>
<div class="flex-1"></div>
<span class="material-icons text-gray-400 dark:text-gray-500 group-hover:text-gray-600 dark:group-hover:text-gray-300 transition-colors">expand_more</span>
</div>
</div>
<div class="border-b border-gray-200/50 dark:border-gray-700/50 p-1">
<div class="flex items-center justify-between px-6 py-4 hover:bg-white/30 dark:hover:bg-gray-700/30 rounded-lg transition-colors cursor-pointer group">
<span class="text-xs font-bold tracking-widest text-gray-500 dark:text-gray-400 uppercase">Week</span>
<div class="flex-1"></div>
<span class="material-icons text-gray-400 dark:text-gray-500 group-hover:text-gray-600 dark:group-hover:text-gray-300 transition-colors">expand_more</span>
</div>
</div>
<div class="p-1 bg-gradient-to-b from-transparent to-white/10 dark:to-black/10">
<div class="px-6 py-6 space-y-6">
<div class="flex flex-col sm:flex-row items-center justify-between gap-4">
<span class="text-xs font-bold tracking-widest text-gray-500 dark:text-gray-400 uppercase self-start sm:self-center mt-2 sm:mt-0 w-20">Dates</span>
<div class="flex-1 flex items-center gap-3 w-full sm:w-auto">
<div class="relative group flex-1">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-gray-400 font-mono text-sm">[</span>
</div>
<input class="w-full bg-blue-50/50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-700 text-gray-700 dark:text-gray-200 text-center rounded-lg py-2 pl-6 pr-6 focus:ring-2 focus:ring-primary focus:border-primary transition-all font-medium hover:bg-blue-50 dark:hover:bg-blue-900/30" type="text" value="01 Jan 2025"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="text-gray-400 font-mono text-sm">]</span>
</div>
</div>
<span class="text-gray-400 dark:text-gray-500 font-light text-2xl">–</span>
<div class="relative group flex-1">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="text-gray-400 font-mono text-sm">[</span>
</div>
<input class="w-full bg-blue-50/50 dark:bg-blue-900/20 border border-blue-200 dark:border-blue-700 text-gray-700 dark:text-gray-200 text-center rounded-lg py-2 pl-6 pr-6 focus:ring-2 focus:ring-primary focus:border-primary transition-all font-medium hover:bg-blue-50 dark:hover:bg-blue-900/30" type="text" value="31 Dec 2025"/>
<div class="absolute inset-y-0 right-0 pr-3 flex items-center pointer-events-none">
<span class="text-gray-400 font-mono text-sm">]</span>
</div>
</div>
</div>
</div>
<div class="relative h-8 flex items-center pt-4 pb-2 pl-24 pr-4"> 
<div class="absolute left-24 right-4 h-2 bg-gray-200 dark:bg-gray-700 rounded-full"></div>
<div class="absolute left-[40%] right-[10%] h-2 bg-primary rounded-full"></div>
<div class="absolute left-[40%] top-1/2 -translate-y-1/2 -translate-x-1/2 w-6 h-6 bg-white dark:bg-gray-800 border-4 border-primary rounded-full shadow-md cursor-pointer hover:scale-110 transition-transform z-10"></div>
<div class="absolute right-[10%] top-1/2 -translate-y-1/2 translate-x-1/2 w-6 h-6 bg-white dark:bg-gray-800 border-4 border-primary rounded-full shadow-md cursor-pointer hover:scale-110 transition-transform z-10"></div>
</div>
</div>
</div>
</div>
<div class="mt-6 flex justify-center items-center gap-2 text-sm text-gray-400 dark:text-gray-500">
<span class="material-icons text-base">info</span>
<span>Press <kbd class="font-mono bg-gray-200 dark:bg-gray-700 px-1 rounded text-xs">Cmd</kbd> + <kbd class="font-mono bg-gray-200 dark:bg-gray-700 px-1 rounded text-xs">click</kbd> to select multiple ranges</span>
</div>
</div>
</div>
<div class="fixed bottom-8 right-8 text-white opacity-40 animate-spin-slow pointer-events-none">
<svg fill="currentColor" height="40" viewBox="0 0 24 24" width="40" xmlns="http://www.w3.org/2000/svg">
<path d="M12 0L14.59 9.41L24 12L14.59 14.59L12 24L9.41 14.59L0 12L9.41 9.41L12 0Z"></path>
</svg>
</div>

</body></html>
